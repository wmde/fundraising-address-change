services:
  app:
    image: "registry.gitlab.com/fun-tech/fundraising-frontend-docker:latest"
    volumes:
      - ./:/code
    links:
      - database
    working_dir: /code

  database:
    image: mariadb:10.6
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER=fundraising
      - MYSQL_PASSWORD=fundraising
      - MYSQL_DATABASE=fundraising
    expose:
      - "3306"
